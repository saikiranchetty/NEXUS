      name: "01-Web"
      description: "Web development projects"
      categories:
        - Static-Websites
        - Dynamic-Websites
        - Frontend-Applications
        - Backend-Applications
        - FullStack-Applications
        - Ecommerce
        - CRM
        - ERP
        - Dashboards
        - Landing-Pages
        - Portfolio-Websites
        - Web-Tools
    
    - id: "02"
      name: "02-AI"
      description: "Artificial Intelligence projects"
      categories:
