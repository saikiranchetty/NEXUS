  repository_files:
    - README.md
    - LICENSE
    - CONTRIBUTING.md
    - SECURITY.md
    - CHANGELOG.md
    - ROADMAP.md
    - .gitignore

  project_folders:
    - docs
    - architecture
    - frontend
    - backend
    - database
    - infrastructure
    - automation
    - prompts
    - scripts
    - tests
    - assets
    - deployment
