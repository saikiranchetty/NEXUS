<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a{
        text-align: center;
       
        }
        .b{
           padding-left: 80px;
        }
        input,select,textarea{
            padding: 10px;
            border-radius: 5px;
        }
        

    
    </style>
</head>
<body>
   <div style="border: 2px solid black; margin: 80px 300px; padding-left: 10px;background-color: brown;color: white;padding-bottom: 20px;">
    <h1 class="a">Discipline Referral Form</h1>
    <hr>
    <h3 class="b" style="margin-bottom: 5px;">Student Name</h3>
    
<div class="b" style="display: flex; margin-bottom: 20px;">
    <div>
        <input type="text"> <br>
        <label for="">First Name</label>
    </div>     
    <div style="margin-left: 50px;">
        <input type="text"> <br>
        <label for="">Last Name</label>  
    </div>
</div>

<div class="b" style="display: flex; margin-bottom: 20px;">
    <div>
        <label for="">Grade</label> <br>
        <select style="width: 180px;" name="" id="">
            <option value="">Please Select</option>
        </select>
    </div>     
    <div style="margin-left: 50px;">
        <label for="">Date</label> <br>
        <input style="width: 170px;" type="Date"> <h5 style="margin-top: 5px;">Date</h5>
    </div>
</div>

<h3 class="b" style="margin-bottom: 5px;">Reffering Staff Name</h3>
<div class="b" style="display: flex;">
    <div>
        <input type="text"> <br>
        <label for="">First Name</label>
    </div>     
    <div style="margin-left: 50px;">
        <input type="text"> <br>
        <label for="">Last Name</label>  
    </div>
</div>

<h3 class="b">Problem Details</h3>
<hr style="margin:20px">
<h4 class="b">Minor Problems</h4>
<div class="b" style="display: flex; margin-bottom: 20px;"> 
    <div>
        <input type="checkbox">
        <label for="">Inappropriate Language</label> <br>
        <input type="checkbox">
        <label for="">Gum Chewing</label> <br>
        <input type="checkbox">
        <label for="">Disruption</label> <br>
        <input type="checkbox">
        <label for="">Other</label>
    </div>     
    <div style="margin-left: 50px;">
        <input type="checkbox">
        <label for="">Dress Code</label> <br>
        <input type="checkbox">
        <label for="">Technology Violation</label> <br>
        <input type="checkbox">
        <label for="">Property Misuse</label> <br>
    </div>
</div>
<h4 class="b">Major Problems</h4>
<div class="b" style="display: flex; margin-bottom: 20px;"> 
    <div>
        <input type="checkbox">
        <label for="">Threat</label> <br>
        <input type="checkbox">
        <label for="">Harassment</label> <br>
        <input type="checkbox">
        <label for="">Alcohol</label> <br><input type="checkbox">
        <label for="">Weapon</label> <br>
        <input type="checkbox">
        <label for="">Other</label>
    </div>     
    <div style="margin-left: 130px;">
        <input type="checkbox">
        <label for="">Fighting</label> <br>
        <input type="checkbox">
        <label for="">Bullying</label> <br>
        <input type="checkbox">
        <label for="">Drug</label> <br>
        <input type="checkbox">
        <label for="">Skipping Class</label> <br>
    </div>
</div>
<h4 class="b">Action(s) Taken Before</h4>
<div class="b" style="display: flex; margin-bottom: 20px;"> 
    <div>
        <input type="checkbox">
        <label for="">Warning Verbally</label> <br>
        <input type="checkbox">
        <label for="">Quite Time Punishment</label> <br>
        <input type="checkbox">
        <label for="">Change Sear Place</label> <br>
        <input type="checkbox">
        <label for="">Other</label>
    </div>     
    <div style="margin-left: 50px;">
        <label for="">Location of Problems(s)</label> <br>
        <select style="width: 180px;" name="" id="">
            <option value="">Please Select</option>
        </select>
    </div>
</div>
<hr style="margin:20px">
<label class="b" for="">Administration Final Decision</label> <br>
<textarea style="margin-left: 80px;" rows="10" cols="90" name="" id="">Type here...</textarea> <br><br>
<div style="display: flex;" class="b">
    <div>
        <label for="">Administrator Name</label> <br><input type="text">
        <h5 style="margin-top: 5px;">First Name</h5>

    </div>
    <div style="margin-left: 20px;">
        <br><input type="text">
        <h5 style="margin-top: 5px;">Last Name</h5>
    </div>
</div>

<label for="" class="b">Administrator Signature</label> <br>
<textarea rows="5" cols="25" name="" id="" style="margin-left: 80px;"></textarea> <br>
<button style="margin-left: 240px;">Clear</button>
<hr> <br>
<button style="margin-left: 400px;">Submit</button>
</div>
<hr> <br><br>


</body></html>
