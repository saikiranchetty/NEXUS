<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
    <div style="display: flex;margin: 20px 150px; padding: 45px; border: 1px solid; background: linear-gradient(to right, white 0%,white 45%,blue 45%,blue 100%); line-height: 30px; border-top-left-radius: 10px;border-top-right-radius: 10px;border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;">
        <div style="padding: 20px;margin-left: 100px;">
            <h2>General Information</h2>
            <select name="" id="" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;">
                <option value="">Title</option>
                <option value="">Miss</option>
                <option value="">Mrs</option>
                <option value="">Mr</option>

            </select><br> <br>
            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="First Name">

            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="Last Name"> <br> <br>

            <select name="" id="" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;">
                <option value="">Position</option>
                <option value="">Full Stack Developer</option>
                <option value="">Backend Developer</option>
                <option value="">Frontend Developer</option>

            </select><br> <br>

            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="Company"> <br> <br>

            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="Business Arena">

            <select name="" id="" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;">
                <option value="">Employees</option>
                <option value="">Full Stack Developer</option>
                <option value="">Backend Developer</option>
                <option value="">Frontend Developer</option>

            </select><br> <br>
        </div>

        
        <div style="margin-left: 5px; padding: 30px;"> 
            <h2>Contact Details</h2> 
            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="Street + Nr"> <br> <br>

            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="Additional Information"> <br> <br>
            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="Zip Code">

            <select name="" id="" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;">
                <option value="">Place</option>
                <option value="">Hyderabad</option>
                <option value="">Banglore</option>
                <option value="">Chennai</option>
                <option value="">Other</option>

            </select><br> <br>

            <select name="" id="" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;">
                <option value="">Country</option>
                <option value="">India</option>
                <option value="">USA</option>
                <option value="">Japan</option>
                <option value="">Other</option>

            </select><br> <br>

            <select name="" id="" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;">
                <option value="">Code</option>
                <option value="">+91</option>
                <option value="">+1</option>
                <option value="">+44</option>
                <option value="">Other</option>

            </select>
            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="Phone Number"> <br> <br>

            <input type="text" style="border-bottom:2px solid black;border-top: 3px solid white;border-right: 3px solid white;border-left: 3px solid white;" placeholder="Your Email"> <br> <br>

            <input type="checkbox" name="" id=""> I do accept the <a style="color: white;" href="#">Terms and Conditions</a> of your site. <br> <br>

            <button style="border-radius: 25px;padding: 5px;">Register Badge</button>

        </div>
    </div>
</form>

</body></html>
