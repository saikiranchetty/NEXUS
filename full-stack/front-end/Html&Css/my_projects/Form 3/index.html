<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
            width: 250px;
            height: 30px;
        }
        button{
            width: 200px;
            height: 30px;
        }
    </style>
</head>
<body>
    <form action="">
        
        <div style="border: 20px solid blue;border-radius: 25px; padding: 30px; margin-left: 250px; margin-right: 250px;">
        <h2>Registration</h2> <br>
        <h3>Personal Details</h3>
        <div style="display: flex;">
            <div>
                <label for="">Full Name</label><br>
                <input type="text" placeholder="Enter your name">
            </div>
            <div style="margin-left: 20px">
                <label for="">Date of Birth</label> <br>
                <input type="text" placeholder="Enter birth date">
           </div>
           <div style="margin-left: 20px">
                <label for="">Email</label> <br>
                <input type="text" placeholder="Enter your email">
           </div> 
        </div> <br><br>

        <div style="display: flex;">
            
            <div>
                <label for="">Mobile Number</label><br>
                <input type="text" placeholder="Enter mobile Number">
            </div>
            <div style="margin-left: 20px">
                <label for="">Gender</label> <br>
                <input type="text" placeholder="Enter your gender">
           </div>
           <div style="margin-left: 20px">
                <label for="">Occupation</label> <br>
                <input type="text" placeholder="Enter occupation">
           </div> 
        </div> <br><br>
        <h3>Identity Details</h3>
        <div style="display: flex;">
            <div>
                <label for="">ID Type</label><br>
                <input type="text" placeholder="Enter ID type">
            </div>
            <div style="margin-left: 20px">
                <label for="">ID Number</label> <br>
                <input type="text" placeholder="Enter ID number">
           </div>
           <div style="margin-left: 20px">
                <label for="">Issue Authority</label> <br>
                <input type="text" placeholder="Enter issue department">
           </div> 
        </div> <br><br>

        <div style="display: flex;">
            
            <div>
                <label for="">Issue Date</label><br>
                <input type="text" placeholder="Enter ID issue date">
            </div>
            <div style="margin-left: 20px">
                <label for="">Issue State</label> <br>
                <input type="text" placeholder="Enter ID issue state">
           </div>
           <div style="margin-left: 20px">
                <label for="">Expiry Date</label> <br>
                <input type="text" placeholder="Enter ID expiry date">
           </div> 
        </div> <br><br>
        <button>Next →</button>


    </div>
    </form>

</body></html>
