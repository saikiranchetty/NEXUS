<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        a{
            text-decoration: none;
            
        }
        input{
            width: 250px;
            padding: 10px;
        }
        button{
            padding: 10px;
            width: 200px;

        }
       
        
    </style>
</head>
<body>
    <form action="">
        <div style="display: flex; border: 2px solid; background-color: blue; padding: 20px;line-height:15px ; margin: 20px 200px;border-radius: 15px;">
            <div style="border: 2px solid; background-color: white;padding: 50px;border-radius: 10px;margin-left: 200px;">
                <h2>Login</h2>
                <input type="text" placeholder="Email"> <br> <br>
                <input type="password" placeholder="Password"> <br> <br>
                <a href="#">Forgot passowrd?</a> <br><br>
                <button style="margin-left: 30px">Login</button> <br> <h5 style="text-align: center;">
                Don't have an account? <a href="#">Signup</a></h5> <br>
                <h4 style="text-align: center;">(OR)</h4><br><br>
            <div class="icons" style="margin-left: 20px;">
                <button>
                    <a href="#"><ion-icon name="logo-facebook"></ion-icon>Login with Facebook</a>
                </button>
                <br><br>
                <button>
                    <a href="#"><ion-icon name="logo-google"></ion-icon>Login with Google</a>
            </button>
            </div>
            </div>

            
            <div style="border: 2px solid;margin-left: 30px;background-color: white;padding: 50px;border-radius: 10px">
                    <h2>Signup</h2>
                    <input type="text" placeholder="Email"> <br> <br>
                    <input type="password" placeholder="Password"> <br> <br> 
                    <input type="password" placeholder="Confirm Password"> <br> <br>
                    
                    <button style="margin-left: 30px;">Signup</button> <br>
                    <h5 style="text-align: center;">Already have an account? <a href="#">Login</a> </h5><br>
                    <h4 style="text-align: center;">(OR)</h4> <br><br>
                <div class="icons" style="margin-left: 20px;">
                    <button>
                       <a href="#"><ion-icon name="logo-facebook"></ion-icon>Login with Facebook</a>
                    </button>
                    <br><br>
                    <button>
                       <a href="#"><ion-icon name="logo-google"></ion-icon>Login with Google</a>
                    </button>
                </div>
             </div>

        </div>
    </form>
    <script src="js/ionicons.js"></script>

</body></html>
