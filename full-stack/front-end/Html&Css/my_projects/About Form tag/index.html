<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
   
    <div id="main">
        <form action="">
            <h4>Registration</h4><br>
            <p>Personal Details</p><br>
            <div id="container">
               
               <div class="box1">
                   <label for=""><strong>Full Name</strong></label>
                   <input type="text" placeholder="Enter Your Name"><br>
   
                   <label for=""><strong>Mobile number</strong></label>
                   <input type="tel" placeholder="Enter mobile number">
               </div>
   
               <div class="box2">
                   <label for=""><strong>Date of Birth</strong></label>
                   <input type="text" placeholder="Enter birth date"><br>
   
                   <label for=""><strong>Gender</strong></label>
                   <input type="text" placeholder="Enter your gender">
               </div>
   
               <div class="box3">
                   <label for=""><strong>Email</strong></label>
                   <input type="email" placeholder="Enter your mail"><br>
   
                   <label for=""><strong>Occupation</strong></label>
                   <input type="text" placeholder="Enter occupation">
               </div>
   
            </div><br>
            <p>Identity Details</p><br>
            <div class="container2">

               <div class="box4">
                   <label for=""><strong>ID Type</strong></label>
                   <input type="text" placeholder="Enter ID type"><br>
                   <label for=""><strong>Issue Date</strong></label>
                   <input type="number" placeholder="Enter ID issue date">
               </div>

               <div class="box5">
                   <label for=""><strong>ID Number</strong></label>
                   <input type="number" placeholder="Enter ID number"><br>
                   <label for=""><strong>Issue Date</strong></label>
                   <input type="number" placeholder="Enter ID issue date ">
               </div>
               
               <div class="box6"> 
                   <label for=""><strong>Issue Authority</strong></label>
                   <input type="text" placeholder="Enter issue department"><br>
                   <label for=""><strong>Expiry Date</strong></label>
                   <input type="number" placeholder="Enter ID expiry date">
               </div>
            </div><br>
            <button style="background-color: blue; color: white; border-radius: 2px;width: 100px;height: 20px; border: none;"><p>Next →</p></button>   
        </form>
    </div>
   

</body></html>
