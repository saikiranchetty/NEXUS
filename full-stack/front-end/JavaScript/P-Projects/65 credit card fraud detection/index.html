<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Card Fraud Detection</title>
  <link rel="icon" href="images/creditlogo.png">
  <link href="css/css2.css" rel="stylesheet">

  <style>
    /* Base Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    }

    #logo {
      width: 60px;
      height: 60px;
      filter: drop-shadow(0 0 8px cyan);
    }

    h1 {
      font-size: 2rem;
      text-shadow: 0 0 10px #00f7ff, 0 0 5px #fff;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 5px #00f7ff;
      }
      to {
        text-shadow: 0 0 20px #00f7ff, 0 0 10px #00f7ff;
      }
    }

    nav .nav-link {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 1.2rem;
      position: relative;
      transition: color 0.3s;
    }

    nav .nav-link::after {
      content: "";
      display: block;
      height: 2px;
      background: #00f7ff;
      transition: width 0.3s;
      width: 0%;
      position: absolute;
      bottom: -5px;
      left: 0;
    }

    nav .nav-link:hover::after {
      width: 100%;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      background: url('images/credit.jpeg') no-repeat center center / cover;
      position: relative;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
    }

    .content {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 255, 255, 0.2);
      animation: fadeIn 1s ease-out forwards;
      max-width: 700px;
    }

    h2 {
      font-size: 2.5rem;
      color: #00f7ff;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00f7ff;
    }

    p {
      font-size: 1.2rem;
      color: #e0e0e0;
      margin-bottom: 30px;
    }

    .cta-btn {
      padding: 12px 30px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #00f7ff, #007bff);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease-in-out;
      box-shadow: 0 0 15px #00f7ff;
    }

    .cta-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00f7ff;
    }

    footer {
      background-color: rgba(0, 0, 0, 0.6);
      color: #fff;
      text-align: center;
      padding: 15px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 0.9rem;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      nav {
        margin-top: 10px;
      }

      .content {
        padding: 20px;
      }

      h2 {
        font-size: 2rem;
      }

      .cta-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <div id="logo-container">
      <img src="images/creditlogo.png" alt="Logo" id="logo">
    </div>
    <div id="title-container">
      <h1>Fraud Detection</h1>
    </div>
    <nav>
      <a class="nav-link" href="login.html">Login</a>
      <a class="nav-link" href="signup.html">Signup</a>
    </nav>
  </header>

  <main>
    <div class="content">
      <h2>Welcome to Credit Card Fraud Detection</h2>
      <p>Empowering financial safety with AI-driven fraud detection and real-time protection.</p>
      <a class="cta-btn" href="signup.html">Start Now</a>
    </div>
  </main>

  



</body></html>
