<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Futuristic Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&amp;display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .form-container {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 40px 35px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      color: white;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
      animation: slideIn 1s ease forwards;
    }

    h2 {
      font-size: 30px;
      margin-bottom: 30px;
      color: #00f7ff;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00f7ff;
    }

    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
      transition: 0.3s ease;
    }

    input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px #00f7ff;
    }

    button.btn {
      position: relative;
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #00f7ff;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      overflow: hidden;
      z-index: 1;
      transition: 0.3s ease;
    }

    button.btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, #00f7ff, #00d4ff, #00f7ff);
      z-index: -1;
      animation: rotate 4s linear infinite;
    }

    button.btn:hover {
      background: #00d4ff;
      box-shadow: 0 0 15px #00f7ff, 0 0 30px #00f7ff;
    }

    #loginMessage {
      margin-top: 15px;
      color: #ff6b6b;
      font-size: 14px;
    }

    .redirect {
      margin-top: 20px;
      font-size: 14px;
      color: #ddd;
    }

    .redirect a {
      color: #00f7ff;
      text-decoration: none;
      font-weight: bold;
    }

    .redirect a:hover {
      text-decoration: underline;
    }

    @keyframes slideIn {
      from {
        transform: translateY(60px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 500px) {
      .form-container {
        padding: 30px 25px;
      }
      h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required=""><br>
      <input type="password" id="loginPassword" placeholder="Password" required=""><br>
      <button type="submit" class="btn">Login</button>
    </form>

    <p id="loginMessage"></p>
    <p class="redirect">Don't have an account? <a href="/signup">Sign up</a></p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      const users = JSON.parse(localStorage.getItem('users')) || [];
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        document.getElementById('loginMessage').style.color = "#00ff88";
        document.getElementById('loginMessage').textContent = "Login successful!";
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
      } else {
        document.getElementById('loginMessage').style.color = "#ff6b6b";
        document.getElementById('loginMessage').textContent = "Invalid credentials!";
      }
    });
  </script>


</body></html>
