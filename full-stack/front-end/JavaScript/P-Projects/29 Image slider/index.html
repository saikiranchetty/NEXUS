<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Image Sliders</title>
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background:linear-gradient(to bottom right,black,grey);
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 100px;
        }

        .slider {
            perspective: 1000px;
            width: 600px;
            height: 400px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .slider-container {
            width: 100%;
            height: 100%;
            position: absolute;
            display: flex;
            transform-style: preserve-3d;
            transition: transform 1s ease;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-origin: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide:nth-child(1) {
            transform: rotateY(0deg) translateZ(300px);
        }

        .slide:nth-child(2) {
            transform: rotateY(90deg) translateZ(300px);
        }

        .slide:nth-child(3) {
            transform: rotateY(180deg) translateZ(300px);
        }

        .slide:nth-child(4) {
            transform: rotateY(270deg) translateZ(300px);
        }

        /* CSS-only Slider Styles */
        .css-slider-container {
            transform: rotateY(0deg);
        }

        #css-slide1:checked ~ .css-slider-container {
            transform: rotateY(0deg);
        }

        #css-slide2:checked ~ .css-slider-container {
            transform: rotateY(-90deg);
        }

        #css-slide3:checked ~ .css-slider-container {
            transform: rotateY(-180deg);
        }

        #css-slide4:checked ~ .css-slider-container {
            transform: rotateY(-270deg);
        }

        /* Arrows for CSS-only slider */
        .css-arrows {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .css-arrows label {
            font-size: 40px;
            color: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            pointer-events: all;
            transition: color 0.3s ease;
        }

        .css-arrows label:hover {
            color: rgba(0, 0, 0, 0.8);
        }

        /* Navigation dots */
        .css-navigation {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .css-navigation label {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="radio"]:checked + .css-navigation label {
            background-color: #fff;
        }

        /* JavaScript Slider Styles */
        .js-arrows {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
        }

        .js-arrows button {
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
            transition: background-color 0.3s;
        }

        .js-arrows button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <h1 style="color: #fff;">Image Slider Examples</h1>

    <!-- Section 1: Using HTML & CSS Only -->
    <div class="section">
        <h2 style="text-align: center;margin-bottom: 20px; color: #fff;">Using HTML &amp; CSS Only</h2>
        <div class="slider css-slider">
            <input type="radio" name="css-slider" id="css-slide1" checked="">
            <input type="radio" name="css-slider" id="css-slide2">
            <input type="radio" name="css-slider" id="css-slide3">
            <input type="radio" name="css-slider" id="css-slide4">

            <div class="slider-container css-slider-container">
                <div class="slide">
                    <img src="images/slide5.jpg" alt="Image 1">
                </div>
                <div class="slide">
                    <img src="images/slide6.jpg" alt="Image 2">
                </div>
                <div class="slide">
                    <img src="images/photo6.jpeg" alt="Image 3">
                </div>
                <div class="slide">
                    <img src="images/slide4.jpg" alt="Image 4">
                </div>
            </div>

            <!-- Arrows for CSS-only slider -->
            <div class="css-arrows">
                <label for="css-slide4" class="prev">❮</label>
                <label for="css-slide2" class="next">❯</label>
            </div>
            <div class="css-arrows">
                <label for="css-slide1" class="prev">❮</label>
                <label for="css-slide3" class="next">❯</label>
            </div>
            <div class="css-arrows">
                <label for="css-slide2" class="prev">❮</label>
                <label for="css-slide4" class="next">❯</label>
            </div>
            <div class="css-arrows">
                <label for="css-slide3" class="prev">❮</label>
                <label for="css-slide1" class="next">❯</label>
            </div>

            <!-- Navigation dots -->
            <div class="css-navigation">
                <label for="css-slide1"></label>
                <label for="css-slide2"></label>
                <label for="css-slide3"></label>
                <label for="css-slide4"></label>
            </div>
        </div>
    </div>

    <!-- Section 2: Using HTML, CSS & JavaScript -->
    <div class="section">
        <h2 style="text-align: center;margin-bottom: 20px;color: #fff;">Using HTML, CSS &amp; JavaScript</h2>
        <div class="slider js-slider">
            <div class="slider-container" id="js-sliderContainer">
                <div class="slide">
                    <img src="images/photo1.jpeg" alt="Image 1">
                </div>
                <div class="slide">
                    <img src="images/photo2.jpeg" alt="Image 2">
                </div>
                <div class="slide">
                    <img src="images/photo3.jpeg" alt="Image 3">
                </div>
                <div class="slide">
                    <img src="images/photo4.jpeg" alt="Image 4">
                </div>
            </div>

            <!-- Navigation Arrows -->
            <div class="js-arrows">
                <button class="prev" id="js-prevBtn">❮</button>
                <button class="next" id="js-nextBtn">❯</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Section -->
    <script>
        const jsSliderContainer = document.getElementById('js-sliderContainer');
        const jsSlides = document.querySelectorAll('#js-sliderContainer .slide');
        const jsTotalSlides = jsSlides.length;
        let jsCurrentSlide = 0;

        function rotateJsSlider() {
            const angle = jsCurrentSlide * -90;
            jsSliderContainer.style.transform = `rotateY(${angle}deg)`;
        }

        document.getElementById('js-nextBtn').addEventListener('click', () => {
            jsCurrentSlide = (jsCurrentSlide + 1) % jsTotalSlides;
            rotateJsSlider();
        });

        document.getElementById('js-prevBtn').addEventListener('click', () => {
            jsCurrentSlide = (jsCurrentSlide - 1 + jsTotalSlides) % jsTotalSlides;
            rotateJsSlider();
        });
    </script>


</body></html>
