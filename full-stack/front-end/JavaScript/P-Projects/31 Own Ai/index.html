<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice &amp; Text Search with AI</title>
    <link rel="stylesheet" href="css/all.min.css">
<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f0f0f0;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    .chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
        margin: auto;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .chatbox {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .chat-message {
        padding: 10px 15px;
        border-radius: 10px;
        max-width: 70%;
    }

    .user-message {
        background-color: #007bff;
        color: white;
        align-self: flex-end;
    }

    .ai-message {
        background-color: #f1f1f1;
        color: #333;
        align-self: flex-start;
    }

    .input-container {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
        background-color: #f9f9f9;
    }

    #searchInput {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        outline: none;
        margin-right: 10px;
    }

    #voiceSearchBtn, #textSearchBtn {
        background-color: #007bff;
        border: none;
        cursor: pointer;
        color: white;
        padding: 10px 15px;
        border-radius: 5px;
        font-size: 16px;
        margin-left: 5px;
    }
</style></head>

<body>
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 10px;background-color: #333;">
        <div style="display: flex; align-items: center;">
            <img src="images/image.png" alt="" style="width: 100px; height: 90px;">
        </div>
        <h1 style="font-size: 28px; font-weight: 800; text-align: end;color: #ddd;">Pranay's_Gpt</h1>
    </nav>
    
    
    <div class="chat-container">
        <div id="chatbox" class="chatbox"></div>
        <div class="input-container">
            <input type="text" id="searchInput" placeholder="Speak or type your query...">
            <button id="voiceSearchBtn"><i class="fas fa-microphone"></i></button>
            <button id="textSearchBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyB16jgbtvBMCsXg2DvbIQSL3dzojfwDWIk"; // Your API key here
        const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;
        
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const voiceSearchBtn = document.getElementById('voiceSearchBtn');
            const textSearchBtn = document.getElementById('textSearchBtn');
            const chatbox = document.getElementById('chatbox');

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                alert("Your browser does not support voice recognition. Please use a different browser.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';

            voiceSearchBtn.addEventListener('click', () => {
                recognition.start();
            });

            recognition.addEventListener('result', (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                searchInput.value = transcript;
                addMessage('user', transcript);
                handleQuery(transcript);
            });

            textSearchBtn.addEventListener('click', () => {
                const query = searchInput.value.trim();
                if (query) {
                    addMessage('user', query);
                    handleQuery(query);
                }
            });

            function addMessage(sender, text) {
                const messageElement = document.createElement('div');
                messageElement.classList.add('chat-message');
                messageElement.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
                messageElement.innerText = text;
                chatbox.appendChild(messageElement);
                chatbox.scrollTop = chatbox.scrollHeight;
            }

            async function handleQuery(query) {
                addMessage('ai', 'Processing...');

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{ 
                              role: "user", 
                              parts: [{ text: query }] 
                            }]
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        const answer = data.candidates[0].content.parts[0].text.trim();
                        addMessage('ai', answer);
                    } else {
                        throw new Error(data.error.message);
                    }

                } catch (error) {
                    console.error('Error fetching response from API:', error);
                    addMessage('ai', 'Sorry, there was an error processing your request.');
                }
            }

            recognition.addEventListener('error', (event) => {
                console.error('Speech recognition error detected:', event.error);
            });

            recognition.addEventListener('end', () => {
                console.log('Speech recognition service disconnected');
            });
        });
    </script>


</body></html>
