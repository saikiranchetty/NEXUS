<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/download.png" type="image/x-icon">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Quiz Application</h1>
        
        <div id="category-selection">
            <h2>Select a Category</h2>
            <button onclick="startQuiz('indian-general-knowledge')"> General Knowledge</button>
            <button onclick="startQuiz('indian-history')"> History</button>
            <button onclick="startQuiz('mathematical-logical')">Mathematical Logical Questions</button>
        </div>
        
        

        <div id="quiz-section" style="display: none;">
            <h2 id="question"></h2>
            <div id="options"></div>
            <div id="feedback"></div>
            <button id="next-btn" style="display: none;" onclick="nextQuestion()">Next Question</button>
            <button id="end-quiz" onclick="endQuiz();" style="display: none;">End Quiz</button>
            <h3>Your Score: <span id="score">0</span></h3>
        </div>
    </div>

    <script src="js/script.js"></script>


</body></html>
