<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Website</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

   
    <div class="hero">
        <div class="navbar">
            <img src="images/logo.png" alt="Logo" class="logo">
            <button type="button" style="margin-right: 20px;">Signup</button>
        </div>
        <div class="content fade-in">
            <small>Welcome to our</small>
            <h1>World's <br> Creative Studio</h1>
            <button type="button" class="fade-in">Take a Tour</button>
        </div>

        <div class="side-bar">
            <img src="images/menu.png" class="menu" alt="Menu">
            <div class="social-links">
                <img src="images/fb.png" alt="Facebook">
                <img src="images/ig.png" alt="Instagram">
                <img src="images/tw.png" alt="Twitter">
            </div>
            <div class="useful-links">
                <img src="images/share.png" alt="Share">
                <img src="images/info.png" alt="Info">
            </div>
        </div>

     
        <div class="bubbles">
            <img src="images/bubble.png" alt="Bubble">
            <img src="images/bubble.png" alt="Bubble">
            <img src="images/bubble.png" alt="Bubble">
            <img src="images/bubble.png" alt="Bubble">
            <img src="images/bubble.png" alt="Bubble">
            <img src="images/bubble.png" alt="Bubble">
            <img src="images/bubble.png" alt="Bubble">
        </div>
    </div>

    
    <button id="scrollTopBtn" title="Go to top">Top</button>

    <script>
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
        e.preventDefault();

        document.querySelector(this.getAttribute('href')).scrollIntoView({
            behavior: 'smooth'
        });
    });
});

const faders = document.querySelectorAll('.fade-in');

const appearOptions = {
    threshold: 0.5,
    rootMargin: "0px 0px -100px 0px"
};

const appearOnScroll = new IntersectionObserver(function(entries, appearOnScroll) {
    entries.forEach(entry => {
        if (!entry.isIntersecting) {
            return;
        } else {
            entry.target.classList.add('show');
            appearOnScroll.unobserve(entry.target);
        }
    });
}, appearOptions);

faders.forEach(fader => {
    appearOnScroll.observe(fader);
});

const buttons = document.querySelectorAll('button');

buttons.forEach(button => {
    button.addEventListener('mouseover', function() {
        this.style.backgroundColor = 'transperent'; 
    });

    button.addEventListener('mouseout', function() {
        this.style.backgroundColor = 'transparent'; 
    });
});


const bubbles = document.querySelectorAll('.bubbles img');

bubbles.forEach(bubble => {
    const randomDuration = Math.random() * 5 + 5; 
    bubble.style.animationDuration = `${randomDuration}s`;
});


const scrollTopBtn = document.getElementById("scrollTopBtn");

window.onscroll = function() {scrollFunction()};

function scrollFunction() {
    if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
        scrollTopBtn.style.display = "block";
    } else {
        scrollTopBtn.style.display = "none";
    }
}

scrollTopBtn.addEventListener('click', function() {
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
});

    </script>


</body></html>
