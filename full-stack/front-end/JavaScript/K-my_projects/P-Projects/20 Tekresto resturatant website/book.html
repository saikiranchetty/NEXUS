<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('restaurant-bg.jpg');
            background-size: cover;
            background-color: bisque;
            background-position: center;
            height: 100vh;
            margin: 0;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            color: #e67e22;
            font-size: 24px;
            margin: 0;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        form {
            display: flex;
            flex-direction: column;
            
        }
        label {
            margin-bottom: 5px;
        }
        input {
            margin-bottom: 15px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .book-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .book-btn:hover {
            background-color: #d35400;
        }
    </style>
</head>
<body>
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Book Your Table</h2>
            <button class="close-btn">×</button>
        </div>
        <form>
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Full Name" required="">
            
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="E-mail" required="">
            
            <label for="date">Date</label>
            <input type="date" id="date" required="">
            
            <label for="time">Time</label>
            <input type="time" id="time" required="">
            
            <button type="submit" class="book-btn">Book Now</button>
        </form>
    </div>

    <script>
        document.querySelector('.close-btn').addEventListener('click', function() {
            alert('Close button clicked. In a real application, this would close the modal.');
        });

        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Booking submitted! In a real application, this would send the booking data to a server.');
        });
    </script>

</body></html>
