<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/image.png" type="image/x-icon">
</head>
<body>
    <section>
        <div class="container">
            <div class="icons">
                <i class="fa fa-moon"></i>
                <i class="fa fa-sun"></i>
            </div>
            <div class="time">
                <div class="time-colon">
                    <div class="time-text">
                        <apn class="num hour_num">08</apn>
                        <span class="text">Hours</span>
                    </div>
                    <span class="colon">:</span>
                </div>
                <div class="time-colon">
                    <div class="time-text">
                        <apn class="num min_num">45</apn>
                        <span class="text">Minutes</span>
                    </div>
                    <span class="colon">:</span>
                </div>
                <div class="time-colon">
                    <div class="time-text">
                        <apn class="num sec_num">06</apn>
                        <span class="text">Seconds</span>
                    </div>
                    <span class="am_pm">AM</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Fontawesome CDN Link -->
    <script src="js/0e24bfa3ea.js" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>

</body></html>
