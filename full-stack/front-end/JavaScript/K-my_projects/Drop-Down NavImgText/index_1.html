<body style="background-color: lightblue; text-align: center; font-family: Arial, sans-serif;">
    <!--Day 7 Task 7 24-04-2025-->
    <h1>IMAGE MAPPING</h1>
    <!-- Image Map Generated by http://www.image-map.net/ -->
    <img src="https://m.media-amazon.com/images/I/61YZc-HG-7L._SX425_.jpg" usemap="#image-map">

    <map name="image-map">
        <area target="" alt="" title="" href="https://en.wikipedia.org/wiki/Nobita_Nobi" coords="144,100,55,376" shape="rect">
        <area target="" alt="" title="" href="https://en.wikipedia.org/wiki/Doraemon" coords="292,399,153,157" shape="rect">
        <area target="" alt="" title="" href="https://en.wikipedia.org/wiki/Shizuka" coords="293,388,400,96" shape="rect">
        <area target="" alt="" title="" href="https://doraemon.fandom.com/wiki/Suneo_Honekawa" coords="268,96,50" shape="circle">
        <area target="" alt="" title="" href="https://doraemon.fandom.com/wiki/Takeshi_Gouda" coords="171,68,58" shape="circle">
    </map>
    <h1># is important in usemap attribute</h1>
    <h2>Without giving map name in map tag we cannot implement image mapping</h2>
    <h2>Tags required for image mapping: <mark>image tag, map tag, area tag</mark></h2>


</body></html>
