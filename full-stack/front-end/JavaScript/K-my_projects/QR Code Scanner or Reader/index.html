<!DOCTYPE html><html lang="en"><head>
    <meta charset="utf-8">
    <title>QR Code Scanner or Reader</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/image.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome CDN Link for Icons -->
    <link rel="stylesheet" href="css/all.min.css">
</head>

<body>
    <div class="wrapper">
        <form action="#">
            <input type="file" hidden="">
            <img src="#" alt="qr-code">
            <div class="content">
                <i class="fas fa-cloud-upload"></i>
                <p>Upload QR Code to Read</p>
            </div>
        </form>
        <div class="details">
            <textarea spellcheck="false" disabled=""></textarea>
            <div class="buttons">
                <button class="close">Close</button>
                <button class="copy">Copy Text</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>

</body></html>
