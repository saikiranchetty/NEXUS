<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRONTEND</title>
    <style>
        .head {
            background: linear-gradient(to right, red, blue);
            box-shadow: 2px 2px 5px black;
            border-radius: 20px;
            color: white;
            text-align: center;
            padding: 10px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body style="background-color: lightblue; font-family: Arial, sans-serif;">

    <!--Day 13 Task 13 05-05-2025-->
    <h2 id="tt" class="head">
        SVG(Scalable Vector Graphics)
    </h2>
    <div style=" display: flex; flex-wrap: nowrap; justify-content: center; width: 100%; height: 300px;">
        <svg width="400px" height="auto">
            <circle cx="150" stroke-width="30" stroke="red" cy="150" r="100" fill="blue">
            </circle>
        </svg>
        <svg width="400px" height="auto">
            <rect x="5" y="100" width="200px" height="100px" stroke="red" stroke-width="10" fill="blue"></rect>
        </svg>
        <svg width="400px" height="auto">
            <rect x="5" y="60" rx="20" ry="20" width="150" height="150" style="fill:red;stroke:black;stroke-width:5;opacity:0.5"></rect>
        </svg>
    </div>

    <div style="display: flex; flex-wrap: wrap; justify-content: center;">
        <div style="flex: 1; max-width: 500px;">
            <svg width="100%" height="auto" viewBox="0 0 200 200">
                <polygon points="100,10 40,198 190,78 10,78 160,198" style="fill:lime;stroke:red;
                stroke-width:5;fill-rule:evenodd;"></polygon>
            </svg>
        </div>
        <div style="flex: 1; max-width: 500px;">
            <svg width="100%" height="auto" viewBox="0 0 200 200">
                <polygon points="100,10 120,75 180,75 130,110 150,170 100,135 50,170 70,110 20,75 80,75" fill="red" stroke="gold" stroke-width="10"></polygon>
            </svg>
        </div>
        <div style="flex: 1; max-width: 500px;">
            <svg width="100%" height="auto" viewBox="0 0 500 500">
                <circle cx="250" cy="250" r="200" fill="blue"></circle>
                <circle cx="250" cy="250" r="100" fill="black"></circle>
            </svg>
        </div>

        <div style="flex: 1; max-width: 500px;">
            <svg width="100%" height="auto" viewBox="0 0 200 200">
                <polygon points="100,20 150,180 50,180" fill="orange" stroke="black" stroke-width="2"></polygon>
                <ellipse cx="100" cy="180" rx="50" ry="10" fill="brown" stroke="black" stroke-width="2"></ellipse>
            </svg>
        </div>
    </div>
    


    <h2 id="uu" class="head">Canvas </h2>
    <canvas id="myCanvas" style="width: 100%; height: auto;">
    </canvas>
    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            const width = canvas.clientWidth;
            canvas.width = width;
            canvas.height = width;
            drawShapes();
        }

        function drawShapes() {
            const width = canvas.width;
            const height = canvas.height;
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'orange';
            ctx.fillRect(width * 0.1, height * 0.1, width * 0.3, height * 0.2);
            ctx.beginPath();
            ctx.moveTo(width * 0.1, height * 0.4);
            ctx.lineTo(width * 0.4, height * 0.7);
            ctx.strokeStyle = 'blue';
            ctx.lineWidth = 5 * (width / 500);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(width * 0.7, height * 0.3, width * 0.15, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = 'blue';
            ctx.lineWidth = 2 * (width / 500);
            ctx.stroke();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    </script>


</body></html>
